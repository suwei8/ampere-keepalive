name: Container Keepalive

on:
  schedule:
    - cron: "7,22,37,52 0-2 * * *"
    - cron: "7,22,37,52 12-23 * * *"
  workflow_dispatch:

concurrency:
  group: container-keepalive
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Render Config
        env:
          SERVICE_HELENPAYNE261_SESSION_B64: ${{ secrets.SERVICE_HELENPAYNE261_SESSION_B64 }}
          SERVICE_LIMING737_SESSION_B64: ${{ secrets.SERVICE_LIMING737_SESSION_B64 }}
        run: |
          node ./scripts/render-config.mjs \
            --mode keepalive \
            --output ./config/accounts.json

      - name: Run Keepalive
        run: |
          node ./scripts/keepalive.mjs \
            --config ./config/accounts.json \
            --log-file ./keepalive.log

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: container-keepalive-${{ github.run_id }}
          path: ./keepalive.log

      - name: Notify Keepalive Failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          {
            echo "Container Keepalive Failure"
            echo "Workflow: ${GITHUB_WORKFLOW}"
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            if [ -f ./keepalive.log ]; then
              echo
              echo "Log tail:"
              tail -n 20 ./keepalive.log
            fi
          } > ./keepalive-failure.txt
          node ./scripts/send-telegram.mjs --message-file ./keepalive-failure.txt
